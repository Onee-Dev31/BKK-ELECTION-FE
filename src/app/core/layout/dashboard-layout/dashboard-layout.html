<app-district-modal></app-district-modal>

<!-- CONTENT STAGE with bg image -->
<div class="stage w-full h-full relative">

    <!-- Background image + overlays -->
    <div class="stage-bg">
        <div class="stage-bg-img" style="background-image:url('/assets/bangkok-bg.png');"></div>
        <div class="stage-bg-overlay"></div>
    </div>

    <!-- CSS Grid of glass panels -->
    <div class="content-grid w-full h-full relative z-10">

        <!-- MAIN MAP AREA -->
        <article class="panel-glass area-map flex flex-col p-4 min-h-0">
            <header
                class="text-[11px] font-black text-teal-400 uppercase tracking-[0.2em] mb-4 flex-shrink-0 flex items-center gap-2 drop-shadow-[0_0_8px_rgba(45,212,191,0.3)]">
                <span
                    class="w-1.5 h-1.5 rounded-full bg-teal-400 flex-shrink-0 shadow-[0_0_8px_rgba(45,212,191,0.6)]"></span>
                ศูนย์สั่งการเลือกตั้งกรุงเทพมหานคร 2026 · 50 เขต
            </header>
            <main class="flex-1 min-h-0 w-full" style="container-type:size;">
                <app-map-viewer class="block w-full h-full"></app-map-viewer>
            </main>
        </article>

        <!-- RIGHT STATS COLUMN -->
        <app-hero-card class="panel-glass area-hero flex flex-col p-5 gap-3 h-full"></app-hero-card>

        <section class="panel-glass area-candidates flex flex-col overflow-hidden min-h-0">
            <header
                class="px-5 py-4 border-b border-white/5 flex items-center justify-between flex-shrink-0 bg-teal-900/10">
                <div class="flex flex-col">
                    <span class="font-black text-sm text-white/90 tracking-tight">ลำดับคะแนน Real-time</span>
                    <span class="text-[9px] font-bold text-teal-400/60 uppercase tracking-[0.1em] mt-0.5">Base:
                        Official 2022 Results</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="relative flex h-2 w-2">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
                    </span>
                    <span class="text-rose-600 text-[10px] font-black tracking-widest uppercase">Live</span>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto min-h-0 custom-scrollbar">
                <app-policy-list class="block w-full h-full"></app-policy-list>
            </div>
            <footer
                class="px-4 py-3 border-t border-white/5 bg-black/20 text-[9px] font-bold text-teal-400/40 text-center flex-shrink-0 uppercase tracking-widest leading-relaxed">
                Source: EC of Thailand & BMA<br />Processed via wevis.info
            </footer>
        </section>

        <!-- BOTTOM INSIGHTS AREA -->
        <section class="panel-glass area-barchart flex flex-col p-5 h-full min-h-0">
            <app-district-barchart class="block w-full h-full" [districtBars]="districtBars()"></app-district-barchart>
        </section>

    </div><!-- end content-grid -->
</div><!-- end stage -->
