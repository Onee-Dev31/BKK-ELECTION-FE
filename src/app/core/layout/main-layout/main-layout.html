<div class="h-screen w-screen bg-[#041e1a] overflow-hidden relative text-white">
  <app-cloud-gate class="z-[100]"></app-cloud-gate>

  <!-- Content area: pb-16 on mobile เผื่อ bottom nav -->
  <div class="absolute inset-0 z-0 sm:pl-24 overflow-y-auto pb-16 sm:pb-0">
      <router-outlet></router-outlet>
  </div>

  <!-- Desktop sidebar -->
  <div class="absolute left-4 top-0 z-50 h-full w-fit hidden sm:flex flex-col justify-center">
      <app-sidebar class="block w-fit h-fit"></app-sidebar>
  </div>

  <!-- Mobile bottom navigation (hidden on sm+) -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 flex sm:hidden items-center justify-around
              px-2 py-2
              bg-[#041e1a]/90 backdrop-blur-2xl
              border-t border-white/8
              safe-bottom">
    @for (item of navItems; track item.id) {
      <button (click)="navigate(item.path)"
              class="flex flex-col items-center gap-1 px-4 py-2 rounded-2xl transition-all duration-300"
              [class.text-[#00d65b]]="isActive(item.path)"
              [class.text-white/40]="!isActive(item.path)">

        <!-- Map icon -->
        @if (item.id === 'map') {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
              d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
          </svg>
        }
        <!-- Compare icon -->
        @if (item.id === 'compare') {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
        }
        <!-- Top10 icon -->
        @if (item.id === 'top10') {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
              d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
          </svg>
        }

        <span class="text-[10px] font-bold tracking-wide">{{ item.label }}</span>

        <!-- Active indicator dot -->
        @if (isActive(item.path)) {
          <span class="w-1 h-1 rounded-full bg-[#00d65b] shadow-[0_0_6px_#00d65b]"></span>
        }
      </button>
    }
  </nav>
</div>
