<div class="text-[11px] font-black text-teal-400 uppercase tracking-[0.2em] mb-3 flex-shrink-0 drop-shadow-sm">
    คะแนนนำ 10 เขต — ชัชชาติ สิทธิพันธุ์
</div>
<div class="flex items-end gap-2 flex-1 min-h-0">
    @for (bar of districtBars(); track bar.id) {
    <div class="flex flex-col items-center justify-end gap-2 flex-1 h-full group">
        <div class="w-full rounded-t-lg transition-all duration-700 shadow-md group-hover:shadow-[0_0_15px_rgba(45,212,191,0.4)] group-hover:scale-x-105"
            [style.height.%]="bar.pct" style="background: linear-gradient(to top, #065f46, #2dd4bf); min-height: 4px;">
        </div>
        <div
            class="text-[9px] font-black text-teal-700 uppercase truncate w-full text-center leading-none mt-1 tracking-tighter opacity-70 group-hover:opacity-100 group-hover:text-teal-400 transition-all">
            {{ bar.label }}</div>
    </div>
    }
</div>
