<nav class="flex items-center gap-3 w-full h-full">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#00d65b]" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input type="text" placeholder="ค้นหา เขต, รายชื่อ..." [(ngModel)]="searchQuery" (focus)="handleSearchFocus()"
        (blur)="handleSearchBlur()"
        class="bg-transparent border-none outline-none text-white flex-1 text-[15px] font-medium placeholder-white/50">

    <!-- Clear Button -->
    @if (searchQuery) {
    <button (click)="clearSearch()" class="clear-button" aria-label="Clear search">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>
    }

    <!-- Search Results Dropdown -->
    @if (isSearchFocused() && searchQuery && searchResults.length > 0) {
    <div class="search-results-dropdown">
        @for (result of searchResults; track result.id + result.type) {
        <div class="result-item" (click)="selectResult(result)">
            <div class="result-icon" [class.district]="result.type === 'district'">
                @if (result.type === 'district') {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
                        clip-rule="evenodd" />
                </svg>
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                        clip-rule="evenodd" />
                </svg>
                }
            </div>
            <div class="result-info">
                <div class="result-title">{{ result.title }}</div>
                <div class="result-subtitle">{{ result.subtitle }}</div>
            </div>
        </div>
        }
    </div>
    }
</nav>
